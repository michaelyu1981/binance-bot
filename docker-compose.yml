services:
  binance-bot:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./logs:/app/logs
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--watch",
        "--interval",
        "60",
        "--alert-threshold",
        "0.5",
      ]
