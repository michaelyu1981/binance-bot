services:
  binance-bot:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--watch",
        "--interval",
        "300",
        "--alert-threshold",
        "2.5",
      ]

  binance-candles:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--collect-candles",
        "--watch",
        "--interval",
        "300",
        "--candle-limit",
        "100",
        "--retention-days",
        "90",
      ]

  binance-signals:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--watch-signals",
        "--watch",
      ]

  binance-fear-greed:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--fear-greed",
        "--watch",
      ]

  binance-dashboard:
    profiles:
      - dashboard
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-admin}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
    volumes:
      - ./logs:/app/logs:ro
      # Read-write: the Live Bot Trader tab writes data/live_bot_config.json
      # (on/off + parameters) here. It never places real orders; see
      # app/live_bot_state.py and docs/binance-api-key-policy.md.
      - ./data:/app/data
    ports:
      - "127.0.0.1:8765:8765"
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--dashboard",
        "--dashboard-host",
        "0.0.0.0",
        "--dashboard-port",
        "8765",
      ]

  binance-paper-trader:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    volumes:
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--paper-trade",
        "--watch",
      ]

  binance-live-trader:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      BINANCE_LIVE_API_KEY: ${BINANCE_LIVE_API_KEY:-}
      BINANCE_LIVE_API_SECRET: ${BINANCE_LIVE_API_SECRET:-}
    volumes:
      - ./data:/app/data
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--live-trade",
        "--watch",
      ]
