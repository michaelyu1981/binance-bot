services:
  binance-bot:
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      - ./logs:/app/logs
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--watch",
        "--interval",
        "60",
        "--alert-threshold",
        "0.5",
      ]

  binance-dashboard:
    profiles:
      - dashboard
    build:
      context: .
    image: binance-bot:local
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs:ro
    ports:
      - "127.0.0.1:8765:8765"
    command:
      [
        "python3",
        "-m",
        "app.main",
        "--dashboard",
        "--dashboard-host",
        "0.0.0.0",
        "--dashboard-port",
        "8765",
      ]
